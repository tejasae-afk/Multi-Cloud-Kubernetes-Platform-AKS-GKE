fullnameOverride: external-dns

provider:
  name: azure

serviceAccount:
  create: true
  name: external-dns
  annotations:
    azure.workload.identity/client-id: 8dcb5696-2c35-4fd0-a85d-fc0f2f3e04de

podLabels:
  azure.workload.identity/use: "true"
  app.kubernetes.io/part-of: multi-cloud-k8s

sources:
  - service
  - istio-gateway
  - istio-virtualservice

policy: upsert-only
registry: txt
txtOwnerId: mc-k8s-aks-external-dns
txtPrefix: txt-
domainFilters:
  - azure.platform.example.com

extraArgs:
  azure-resource-group: mc-k8s-dns-rg
  publish-internal-services: "false"
  events: "true"

interval: 1m
triggerLoopOnEvent: true
logFormat: json
logLevel: info

# This is still the smallest complete way I found to feed azure.json from Helm.
# TODO: switch this over once the chart gives me a cleaner non-deprecated path.
secretConfiguration:
  enabled: true
  mountPath: /etc/kubernetes
  data:
    azure.json: |
      {
        "tenantId": "00000000-0000-0000-0000-000000000000",
        "subscriptionId": "00000000-0000-0000-0000-000000000000",
        "resourceGroup": "mc-k8s-dns-rg",
        "aadClientId": "8dcb5696-2c35-4fd0-a85d-fc0f2f3e04de",
        "useWorkloadIdentityExtension": true
      }

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: true

rbac:
  create: true
  additionalPermissions:
    - apiGroups:
        - networking.istio.io
      resources:
        - gateways
        - virtualservices
      verbs:
        - get
        - list
        - watch

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: external-dns
