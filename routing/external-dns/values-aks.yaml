fullnameOverride: external-dns

provider:
  name: azure

sources:
  - service
  - istio-gateway
  - istio-virtualservice

domainFilters:
  - platform.haleops.net

registry: txt
txtOwnerId: mc-k8s-aks
txtPrefix: txt-
policy: upsert-only
interval: 30s
triggerLoopOnEvent: true
logLevel: info
logFormat: json

serviceAccount:
  create: true
  name: external-dns
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: 00000000-1111-2222-3333-444444444444

podLabels:
  platform.haleops.net/cluster: aks
  azure.workload.identity/use: "true"

extraVolumes:
  - name: azure-config-file
    secret:
      secretName: external-dns-azure

extraVolumeMounts:
  - name: azure-config-file
    mountPath: /etc/kubernetes
    readOnly: true

extraArgs:
  - --azure-resource-group=mc-k8s-dns-rg
  - --azure-maxretries-count=1
  - --annotation-filter=external-dns.alpha.kubernetes.io/public in (true)
  - --events
  - --txt-cache-interval=1m

rbac:
  create: true

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: external-dns
