fullnameOverride: external-dns

provider:
  name: google

serviceAccount:
  create: true
  name: external-dns
  annotations:
    iam.gke.io/gcp-service-account: external-dns@mc-k8s-platform-dev.iam.gserviceaccount.com

sources:
  - service
  - istio-gateway
  - istio-virtualservice

policy: upsert-only
registry: txt
txtOwnerId: mc-k8s-gke-external-dns
txtPrefix: txt-
domainFilters:
  - gcp.platform.example.com

extraArgs:
  google-project: mc-k8s-platform-dev
  google-batch-change-size: "1000"
  publish-internal-services: "false"
  events: "true"

interval: 1m
triggerLoopOnEvent: true
logFormat: json
logLevel: info

nodeSelector:
  iam.gke.io/gke-metadata-server-enabled: "true"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: true

rbac:
  create: true
  additionalPermissions:
    - apiGroups:
        - networking.istio.io
      resources:
        - gateways
        - virtualservices
      verbs:
        - get
        - list
        - watch

podLabels:
  app.kubernetes.io/part-of: multi-cloud-k8s

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: external-dns
