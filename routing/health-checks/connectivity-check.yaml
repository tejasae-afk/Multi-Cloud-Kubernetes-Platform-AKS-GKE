apiVersion: batch/v1
kind: CronJob
metadata:
  name: mesh-connectivity-check
  namespace: platform
  labels:
    app.kubernetes.io/name: mesh-connectivity-check
    app.kubernetes.io/part-of: multi-cloud-k8s
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mesh-connectivity-check
            app.kubernetes.io/part-of: multi-cloud-k8s
          annotations:
            sidecar.istio.io/inject: "true"
        spec:
          restartPolicy: Never
          containers:
            - name: curl
              image: curlimages/curl:8.12.1
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "starting mesh connectivity check at ${started_at}"
                  curl -fsS http://istio-ingressgateway.istio-system.svc.cluster.local/api/health                     -H "Host: api.platform.example.com" >/tmp/api.json
                  curl -fsS http://istio-ingressgateway.istio-system.svc.cluster.local/api/orders                     -H "Host: api.platform.example.com"                     -H "x-route-to: aks" >/tmp/orders.json
                  echo "api ok: $(wc -c </tmp/api.json) bytes"
                  echo "orders via aks ok: $(wc -c </tmp/orders.json) bytes"
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
