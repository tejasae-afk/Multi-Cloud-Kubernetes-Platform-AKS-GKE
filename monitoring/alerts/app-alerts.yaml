apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: monitoring
  labels:
    release: mc-monitoring
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  groups:
    - name: app-health
      rules:
        - alert: AppLatencyP99High
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, service) (
                rate(mcplatform_http_request_duration_seconds_bucket{route!="/metrics"}[5m])
              )
            ) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: App p99 latency is above 2s
            description: '{{ $labels.service }} p99 latency stayed above 2 seconds for 10 minutes.'
        - alert: OrderServiceErrorRateHigh
          expr: |
            (
              sum(rate(mcplatform_http_requests_total{service="order-service", status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(mcplatform_http_requests_total{service="order-service"}[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Order service 5xx rate is above 5%
            description: order-service has been above 5% 5xx traffic for 5 minutes.
