commonLabels:
  project: multi-cloud-k8s
  environment: dev
  managed-by: helm

fullnameOverride: mc-monitoring-aks

grafana:
  enabled: false

alertmanager:
  enabled: false

kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false

prometheus:
  service:
    type: ClusterIP
  prometheusSpec:
    replicas: 1
    retention: 3d
    scrapeInterval: 30s
    evaluationInterval: 30s
    externalLabels:
      cluster: aks
      environment: dev
      project: multi-cloud-k8s
    serviceMonitorSelector:
      matchLabels:
        release: mc-monitoring
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    ruleSelector:
      matchLabels:
        release: mc-monitoring
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    remoteWrite:
      - name: thanos-receive-gke
        url: ${THANOS_RECEIVE_URL}
        remoteTimeout: 30s
        headers:
          X-Remote-Write-Token: ${THANOS_RECEIVE_TOKEN}
        queueConfig:
          capacity: 5000
          maxShards: 20
          minShards: 2
          maxSamplesPerSend: 1000
          batchSendDeadline: 5s
        metadataConfig:
          send: true
        writeRelabelConfigs:
          - sourceLabels:
              - __name__
            action: keep
            regex: 'up|istio_.*|envoy_.*|mcplatform_.*|kube_.*|node_.*|container_.*|prometheus_remote_storage_.*'
    additionalScrapeConfigs:
      - job_name: istiod
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - istio-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: istiod
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http-monitoring
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
      - job_name: envoy-stats
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - platform
                - istio-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: istio-proxy
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:15090
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

kube-state-metrics:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
