apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-receive-hashring
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
data:
  hashring.json: |
    [
      {
        "algorithm": "ketama",
        "endpoints": [
          {
            "address": "thanos-receive.monitoring.svc.cluster.local:10901"
          }
        ]
      }
    ]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-receive-nginx-template
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
data:
  default.conf.template: |
    server {
      listen 10908;
      server_tokens off;
      client_max_body_size 64m;

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /api/v1/receive {
        if ($http_x_remote_write_token != "__THANOS_RECEIVE_TOKEN__") {
          return 403;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:19090;
      }

      location / {
        return 404;
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thanos-receive-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-receive
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-receive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-receive
        app.kubernetes.io/part-of: multi-cloud-k8s
        project: multi-cloud-k8s
        environment: dev
        managed-by: kubectl
    spec:
      initContainers:
        - name: render-nginx-config
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sed "s/__THANOS_RECEIVE_TOKEN__/${THANOS_RECEIVE_TOKEN}/g" \
                /templates/default.conf.template > /etc/nginx/conf.d/default.conf
          env:
            - name: THANOS_RECEIVE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: thanos-receive-auth
                  key: token
          volumeMounts:
            - name: nginx-template
              mountPath: /templates
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      containers:
        - name: thanos-receive
          image: quay.io/thanos/thanos:v0.41.0
          args:
            - receive
            - --log.level=info
            - --tsdb.path=/var/thanos/receive
            - --tsdb.retention=10d
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
            - --remote-write.address=127.0.0.1:19090
            - --receive.replication-factor=1
            - --receive.local-endpoint=thanos-receive.monitoring.svc.cluster.local:10901
            - --receive.hashrings-file=/etc/thanos/hashring.json
            - --receive.hashrings-algorithm=ketama
            - '--label=receive_cluster="gke"'
            - '--label=receive_replica="0"'
          ports:
            - name: grpc
              containerPort: 10901
            - name: http
              containerPort: 10902
            - name: internal-rw
              containerPort: 19090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: thanos-receive-data
              mountPath: /var/thanos/receive
            - name: hashring
              mountPath: /etc/thanos
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
        - name: nginx
          image: nginx:1.27.5-alpine
          ports:
            - name: remote-write
              containerPort: 10908
          readinessProbe:
            httpGet:
              path: /healthz
              port: remote-write
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: remote-write
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: thanos-receive-data
          persistentVolumeClaim:
            claimName: thanos-receive-data
        - name: hashring
          configMap:
            name: thanos-receive-hashring
            items:
              - key: hashring.json
                path: hashring.json
        - name: nginx-template
          configMap:
            name: thanos-receive-nginx-template
            items:
              - key: default.conf.template
                path: default.conf.template
        - name: nginx-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-receive
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: thanos-receive
  ports:
    - name: grpc
      port: 10901
      targetPort: grpc
    - name: http
      port: 10902
      targetPort: http
    - name: remote-write
      port: 10908
      targetPort: remote-write
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-receive-external
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: thanos-receive
  ports:
    - name: remote-write
      port: 19291
      targetPort: remote-write
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-query
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-query
        app.kubernetes.io/part-of: multi-cloud-k8s
        project: multi-cloud-k8s
        environment: dev
        managed-by: kubectl
    spec:
      containers:
        - name: thanos-query
          image: quay.io/thanos/thanos:v0.41.0
          args:
            - query
            - --log.level=info
            - --http-address=0.0.0.0:9090
            - --grpc-address=0.0.0.0:10901
            - --query.replica-label=prometheus_replica
            - --endpoint=dnssrv+_grpc._tcp.mc-monitoring-gke-thanos-discovery.monitoring.svc.cluster.local
            - --endpoint=thanos-receive.monitoring.svc.cluster.local:10901
          ports:
            - name: http
              containerPort: 9090
            - name: grpc
              containerPort: 10901
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-query
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-query
    app.kubernetes.io/part-of: multi-cloud-k8s
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: thanos-query
  ports:
    - name: http
      port: 9090
      targetPort: http
    - name: grpc
      port: 10901
      targetPort: grpc
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: thanos-receive
  namespace: monitoring
  labels:
    release: mc-monitoring
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-receive
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
