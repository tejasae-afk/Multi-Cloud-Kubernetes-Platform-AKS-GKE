apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway
  namespace: monitoring
  labels:
    release: mc-monitoring
    project: multi-cloud-k8s
    environment: dev
    managed-by: kubectl
spec:
  namespaceSelector:
    matchNames:
      - platform
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
