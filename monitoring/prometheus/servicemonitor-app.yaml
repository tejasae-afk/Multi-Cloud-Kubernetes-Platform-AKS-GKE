apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway
  namespace: monitoring
  labels:
    project: multi-cloud-k8s
    environment: dev
    managed-by: manifests
spec:
  jobLabel: "app.kubernetes.io/name"
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
