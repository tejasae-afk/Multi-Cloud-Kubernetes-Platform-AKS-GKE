apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "order-service.fullname" . }}
  labels:
    {{- include "order-service.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  INVENTORY_SERVICE_URL: {{ default (printf "http://%s-inventory-service:8082" .Release.Name) .Values.config.inventoryServiceURL | quote }}
