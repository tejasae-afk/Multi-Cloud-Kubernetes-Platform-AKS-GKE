apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api-gateway.fullname" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ORDER_SERVICE_URL: {{ default (printf "http://%s-order-service:8081" .Release.Name) .Values.config.orderServiceURL | quote }}
