global:
  commonLabels:
    project: multi-cloud-k8s
    environment: dev
  podLabels: {}
  podAnnotations: {}
  nodeAffinity:
    key: ""
    values: []

# TODO: pin these to the image digest once I wire the release job.
api-gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/tejasae-afk/multi-cloud-k8s-platform/api-gateway
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  config:
    port: "8080"
    logLevel: info
    orderServiceURL: ""
  probes:
    startup:
      failureThreshold: 24
      periodSeconds: 5
    readiness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2
    liveness:
      periodSeconds: 20
      failureThreshold: 3
      timeoutSeconds: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  podLabels: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

