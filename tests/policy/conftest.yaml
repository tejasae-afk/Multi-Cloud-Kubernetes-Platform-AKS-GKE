# I keep this as a tiny repo-local manifest for the policy test inputs.
# Conftest itself still reads TOML config, so the workflow passes the CLI flags directly.
version: 1
policy:
  namespace: main
  path: tests/policy/opa-policies
inputs:
  - helm/values.yaml
  - helm/values-gke.yaml
  - helm/values-aks.yaml
rendered:
  output: /tmp/rendered/platform.yaml
