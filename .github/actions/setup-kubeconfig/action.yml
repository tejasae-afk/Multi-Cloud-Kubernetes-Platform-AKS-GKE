name: setup-kubeconfig

description: Authenticate to both clouds with OIDC and make sure kubectl can talk to GKE and AKS.

inputs:
  gcp_project_id:
    description: GCP project ID.
    required: true
  gcp_workload_identity_provider:
    description: Full Workload Identity Provider path.
    required: true
  gcp_service_account:
    description: Service account email used from GitHub.
    required: true
  gke_cluster_name:
    description: GKE cluster name.
    required: true
  gke_location:
    description: GKE zone or region.
    required: true
  gke_context_name:
    description: Short kubeconfig context name for GKE.
    required: false
    default: gke
  gke_use_connect_gateway:
    description: Use Connect Gateway for private GKE access.
    required: false
    default: "true"
  gke_use_dns_based_endpoint:
    description: Use the DNS-based control plane endpoint.
    required: false
    default: "false"
  azure_client_id:
    description: Azure federated identity client ID.
    required: true
  azure_tenant_id:
    description: Azure tenant ID.
    required: true
  azure_subscription_id:
    description: Azure subscription ID.
    required: true
  aks_resource_group:
    description: AKS resource group.
    required: true
  aks_cluster_name:
    description: AKS cluster name.
    required: true
  aks_context_name:
    description: Short kubeconfig context name for AKS.
    required: false
    default: aks
  install_helm:
    description: Install Helm alongside kubectl.
    required: false
    default: "false"

outputs:
  kubeconfig:
    description: Merged kubeconfig path.
    value: ${{ steps.kubeconfig.outputs.path }}

runs:
  using: composite
  steps:
    - name: Auth to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.gcp_project_id }}
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}
        audience: ${{ inputs.gcp_workload_identity_provider }}

    - name: Install gcloud
      uses: google-github-actions/setup-gcloud@v3
      with:
        version: ">= 562.0.0"

    - name: Fetch GKE credentials
      id: gke
      uses: google-github-actions/get-gke-credentials@v3
      with:
        cluster_name: ${{ inputs.gke_cluster_name }}
        location: ${{ inputs.gke_location }}
        project_id: ${{ inputs.gcp_project_id }}
        context_name: ${{ inputs.gke_context_name }}
        use_connect_gateway: ${{ inputs.gke_use_connect_gateway }}
        use_dns_based_endpoint: ${{ inputs.gke_use_dns_based_endpoint }}

    - name: Lock kubeconfig path
      id: kubeconfig
      shell: bash
      run: |
        cp "${{ steps.gke.outputs.kubeconfig_path }}" "$RUNNER_TEMP/mc-kubeconfig"
        echo "KUBECONFIG=$RUNNER_TEMP/mc-kubeconfig" >> "$GITHUB_ENV"
        echo "path=$RUNNER_TEMP/mc-kubeconfig" >> "$GITHUB_OUTPUT"

    - name: Auth to Azure
      uses: azure/login@v2.1.1
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v4.0.1
      with:
        version: v1.29.15

    - name: Install kubelogin
      uses: azure/use-kubelogin@v1
      with:
        kubelogin-version: v0.0.24

    - name: Install Helm
      if: ${{ inputs.install_helm == 'true' }}
      uses: azure/setup-helm@v4.3.1
      with:
        version: v3.18.4

    - name: Fetch AKS credentials
      uses: azure/aks-set-context@v5
      with:
        resource-group: ${{ inputs.aks_resource_group }}
        cluster-name: ${{ inputs.aks_cluster_name }}
        subscription: ${{ inputs.azure_subscription_id }}
        admin: "false"
        use-kubelogin: "true"

    - name: Rename AKS context and print contexts
      shell: bash
      run: |
        current_ctx="$(kubectl config current-context)"
        kubectl config rename-context "$current_ctx" "${{ inputs.aks_context_name }}" >/dev/null 2>&1 || true
        kubectl config use-context "${{ inputs.gke_context_name }}" >/dev/null 2>&1
        kubectl config get-contexts
