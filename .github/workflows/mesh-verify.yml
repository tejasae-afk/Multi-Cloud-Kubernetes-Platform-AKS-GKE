name: mesh-verify

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - deploy
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on:
      - self-hosted
      - platform
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubeconfig contexts
        uses: ./.github/actions/setup-kubeconfig
        with:
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-wif-provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_GHA_SERVICE_ACCOUNT }}
          gke-cluster-name: ${{ vars.GKE_CLUSTER_NAME }}
          gke-location: ${{ vars.GKE_LOCATION }}
          gke-use-internal-ip: "true"
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aks-resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks-cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Verify mesh
        shell: bash
        run: |
          set -euo pipefail
          ./mesh/scripts/verify-mesh.sh
