name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy. I usually use a short SHA from build-push.
        required: false
        default: main
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to deploy.
        required: false
        type: string
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAMESPACE: platform
      RELEASE_NAME: mc-platform
      IMAGE_TAG: ${{ inputs.image_tag || github.event.inputs.image_tag || 'main' }}
      PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
      GKE_EDGE_HOST: ${{ vars.GKE_EDGE_HOST }}
      AKS_EDGE_HOST: ${{ vars.AKS_EDGE_HOST }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Auth and kubeconfig
        uses: ./.github/actions/setup-kubeconfig
        with:
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}
          gke_cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          gke_location: ${{ vars.GKE_LOCATION }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
          install_helm: "true"

      - name: Build chart dependencies
        run: helm dependency build ./helm

      - name: Prepare image overrides
        run: |
          cat > "$RUNNER_TEMP/gke-images.yaml" <<EOF
          api-gateway:
            image:
              repository: gcr.io/${{ vars.GCP_PROJECT_ID }}/multi-cloud-k8s-platform/api-gateway
              tag: "${IMAGE_TAG}"
          order-service:
            image:
              repository: gcr.io/${{ vars.GCP_PROJECT_ID }}/multi-cloud-k8s-platform/order-service
              tag: "${IMAGE_TAG}"
          inventory-service:
            image:
              repository: gcr.io/${{ vars.GCP_PROJECT_ID }}/multi-cloud-k8s-platform/inventory-service
              tag: "${IMAGE_TAG}"
          EOF

          cat > "$RUNNER_TEMP/aks-images.yaml" <<EOF
          api-gateway:
            image:
              repository: ${{ vars.ACR_NAME }}.azurecr.io/multi-cloud-k8s-platform/api-gateway
              tag: "${IMAGE_TAG}"
          order-service:
            image:
              repository: ${{ vars.ACR_NAME }}.azurecr.io/multi-cloud-k8s-platform/order-service
              tag: "${IMAGE_TAG}"
          inventory-service:
            image:
              repository: ${{ vars.ACR_NAME }}.azurecr.io/multi-cloud-k8s-platform/inventory-service
              tag: "${IMAGE_TAG}"
          EOF

      - name: Deploy to GKE first
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm             --namespace "$APP_NAMESPACE"             --create-namespace             --kube-context gke             -f helm/values.yaml             -f helm/values-gke.yaml             -f "$RUNNER_TEMP/gke-images.yaml"             --wait             --timeout 15m

      - name: Patch GKE live hosts and DNS annotation
        run: |
          kubectl --context gke -n istio-system annotate service istio-ingressgateway             external-dns.alpha.kubernetes.io/hostname="${GKE_EDGE_HOST}"             external-dns.alpha.kubernetes.io/ttl="30"             --overwrite

          cat <<EOF | kubectl --context gke apply -f -
          apiVersion: networking.istio.io/v1
          kind: Gateway
          metadata:
            name: public-api
            namespace: ${APP_NAMESPACE}
          spec:
            selector:
              istio: ingressgateway
            servers:
              - port:
                  number: 80
                  name: http
                  protocol: HTTP
                hosts:
                  - api.platform.local
                  - ${PUBLIC_HOST}
                  - ${GKE_EDGE_HOST}
                  - ${AKS_EDGE_HOST}
          ---
          apiVersion: networking.istio.io/v1
          kind: VirtualService
          metadata:
            name: api-gateway-route
            namespace: ${APP_NAMESPACE}
          spec:
            hosts:
              - api.platform.local
              - ${PUBLIC_HOST}
              - ${GKE_EDGE_HOST}
              - ${AKS_EDGE_HOST}
            gateways:
              - ${APP_NAMESPACE}/public-api
            http:
              - name: header-force-gke
                match:
                  - headers:
                      x-route-to:
                        exact: gke
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: gke
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: gke
                    weight: 100
              - name: header-force-aks
                match:
                  - headers:
                      x-route-to:
                        exact: aks
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: aks
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: aks
                    weight: 100
              - name: weighted-cross-cloud
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: gke
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: gke
                    weight: 70
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: aks
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: aks
                    weight: 30
          EOF

      - name: Smoke test GKE
        run: |
          tests/smoke/test_endpoints.sh --context gke --namespace "$APP_NAMESPACE" --release-name "$RELEASE_NAME"
          gke_edge="$(kubectl --context gke -n istio-system get svc istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}{.status.loadBalancer.ingress[0].hostname}')"
          tests/smoke/test_endpoints.sh --base-url "http://${gke_edge}" --host-header "$PUBLIC_HOST"

      - name: Deploy to AKS second
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm             --namespace "$APP_NAMESPACE"             --create-namespace             --kube-context aks             -f helm/values.yaml             -f helm/values-aks.yaml             -f "$RUNNER_TEMP/aks-images.yaml"             --wait             --timeout 15m

      - name: Patch AKS live hosts and DNS annotation
        run: |
          kubectl --context aks -n istio-system annotate service istio-ingressgateway             external-dns.alpha.kubernetes.io/hostname="${AKS_EDGE_HOST}"             external-dns.alpha.kubernetes.io/ttl="30"             --overwrite

          cat <<EOF | kubectl --context aks apply -f -
          apiVersion: networking.istio.io/v1
          kind: Gateway
          metadata:
            name: public-api
            namespace: ${APP_NAMESPACE}
          spec:
            selector:
              istio: ingressgateway
            servers:
              - port:
                  number: 80
                  name: http
                  protocol: HTTP
                hosts:
                  - api.platform.local
                  - ${PUBLIC_HOST}
                  - ${GKE_EDGE_HOST}
                  - ${AKS_EDGE_HOST}
          ---
          apiVersion: networking.istio.io/v1
          kind: VirtualService
          metadata:
            name: api-gateway-route
            namespace: ${APP_NAMESPACE}
          spec:
            hosts:
              - api.platform.local
              - ${PUBLIC_HOST}
              - ${GKE_EDGE_HOST}
              - ${AKS_EDGE_HOST}
            gateways:
              - ${APP_NAMESPACE}/public-api
            http:
              - name: header-force-gke
                match:
                  - headers:
                      x-route-to:
                        exact: gke
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: gke
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: gke
                    weight: 100
              - name: header-force-aks
                match:
                  - headers:
                      x-route-to:
                        exact: aks
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: aks
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: aks
                    weight: 100
              - name: weighted-cross-cloud
                route:
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: gke
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: gke
                    weight: 70
                  - destination:
                      host: ${RELEASE_NAME}-api-gateway.${APP_NAMESPACE}.svc.cluster.local
                      subset: aks
                      port:
                        number: 8080
                    headers:
                      response:
                        add:
                          x-served-by: aks
                    weight: 30
          EOF

      - name: Smoke test AKS
        run: |
          tests/smoke/test_endpoints.sh --context aks --namespace "$APP_NAMESPACE" --release-name "$RELEASE_NAME"
          aks_edge="$(kubectl --context aks -n istio-system get svc istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}{.status.loadBalancer.ingress[0].hostname}')"
          tests/smoke/test_endpoints.sh --base-url "http://${aks_edge}" --host-header "$PUBLIC_HOST"
