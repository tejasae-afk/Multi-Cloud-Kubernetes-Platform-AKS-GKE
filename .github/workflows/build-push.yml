name: build-push

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - order-service
          - inventory-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build local image
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./app/${{ matrix.service }}
          load: true
          platforms: linux/amd64
          tags: local/${{ matrix.service }}:${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: HIGH,CRITICAL

      - name: Authenticate to Google Cloud
        id: gcp_auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_GHA_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to gcr.io
        # gcr.io in this repo is the Artifact Registry-backed path, not the retired Container Registry backend.
        uses: docker/login-action@v3.6.0
        with:
          registry: gcr.io
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Authenticate to Azure
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Push image to both registries
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./app/${{ matrix.service }}
          push: true
          platforms: linux/amd64
          tags: |
            gcr.io/${{ vars.GCP_PROJECT_ID }}/mc-k8s/${{ matrix.service }}:${{ github.sha }}
            gcr.io/${{ vars.GCP_PROJECT_ID }}/mc-k8s/${{ matrix.service }}:main
            ${{ vars.ACR_NAME }}.azurecr.io/mc-k8s/${{ matrix.service }}:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/mc-k8s/${{ matrix.service }}:main

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    with:
      image_tag: ${{ github.sha }}
