name: terraform-apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'routing/traffic-manager/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Auth and kubeconfig
        uses: ./.github/actions/setup-kubeconfig
        with:
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}
          gke_cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          gke_location: ${{ vars.GKE_LOCATION }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_wrapper: false
          terraform_version: 1.14.8

      - name: Apply core Terraform
        working-directory: terraform
        run: |
          export TF_VAR_gcp_project_id="${{ vars.GCP_PROJECT_ID }}"
          export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
          export TF_VAR_public_dns_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
          export TF_VAR_traffic_manager_relative_name="${{ vars.TRAFFIC_MANAGER_RELATIVE_NAME }}"

          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/core"
          terraform apply -auto-approve

      - name: Apply edge routing Terraform
        working-directory: routing/traffic-manager
        run: |
          export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
          export TF_VAR_public_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
          export TF_VAR_public_zone_resource_group_name="${{ vars.AZURE_DNS_RESOURCE_GROUP }}"
          export TF_VAR_public_record_name="${{ vars.PUBLIC_APP_RECORD_NAME }}"
          export TF_VAR_gke_endpoint_fqdn="${{ vars.GKE_EDGE_HOST }}"
          export TF_VAR_aks_endpoint_fqdn="${{ vars.AKS_EDGE_HOST }}"
          export TF_VAR_create_public_cname="true"

          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/routing-edge"
          terraform apply -auto-approve
