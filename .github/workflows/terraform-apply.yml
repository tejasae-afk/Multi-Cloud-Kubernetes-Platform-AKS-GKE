name: terraform-apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "routing/traffic-manager/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-main
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_gcp_region: ${{ vars.GKE_LOCATION }}
  TF_VAR_gke_cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
  TF_VAR_azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
  TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
  TF_VAR_aks_resource_group_name: ${{ vars.AKS_RESOURCE_GROUP }}
  TF_VAR_dns_zone_name: ${{ vars.DNS_ZONE_NAME }}
  TF_VAR_resource_group_name: ${{ vars.ROUTING_RESOURCE_GROUP }}
  TF_VAR_profile_relative_name: ${{ vars.TRAFFIC_MANAGER_RELATIVE_NAME }}
  TF_VAR_shared_hostname: ${{ vars.APP_FQDN }}
  TF_VAR_gke_endpoint_fqdn: ${{ vars.GKE_APP_FQDN }}
  TF_VAR_aks_endpoint_fqdn: ${{ vars.AKS_APP_FQDN }}

jobs:
  apply:
    runs-on: ubuntu-24.04
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_GHA_SERVICE_ACCOUNT }}

      - name: Authenticate to Azure
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Apply root stack
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ vars.TF_STATE_PREFIX }}"
          terraform validate -no-color
          terraform plan -no-color -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Apply routing stack
        working-directory: routing/traffic-manager
        shell: bash
        run: |
          set -euo pipefail
          terraform init
          terraform validate -no-color
          terraform plan -no-color -out=tfplan
          terraform apply -auto-approve tfplan
