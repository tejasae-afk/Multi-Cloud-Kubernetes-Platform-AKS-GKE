name: nightly-tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
      GKE_EDGE_HOST: ${{ vars.GKE_EDGE_HOST }}
      AKS_EDGE_HOST: ${{ vars.AKS_EDGE_HOST }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Auth and kubeconfig
        uses: ./.github/actions/setup-kubeconfig
        with:
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}
          gke_cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          gke_location: ${{ vars.GKE_LOCATION }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Install k6
        uses: grafana/setup-k6-action@v1.1.0

      - name: Install istioctl
        run: |
          curl -L https://istio.io/downloadIstio | ISTIO_VERSION=1.29.1 TARGET_ARCH=x86_64 sh -
          echo "$PWD/istio-1.29.1/bin" >> "$GITHUB_PATH"

      - name: Smoke endpoints on GKE
        run: tests/smoke/test_endpoints.sh --context gke --namespace platform --release-name mc-platform

      - name: Smoke endpoints on AKS
        run: tests/smoke/test_endpoints.sh --context aks --namespace platform --release-name mc-platform

      - name: Smoke metrics
        run: tests/smoke/test_metrics.sh --context gke --namespace monitoring

      - name: Cross-cluster integration
        run: tests/integration/test_cross_cluster.sh --context-gke gke --context-aks aks --public-host "$PUBLIC_HOST"

      - name: Mesh routing integration
        run: tests/integration/test_mesh_routing.sh --public-host "$PUBLIC_HOST"

      - name: Failover integration
        run: tests/integration/test_failover.sh --public-host "$PUBLIC_HOST"

      - name: Load test
        run: tests/load/run-load-test.sh --base-url "http://${PUBLIC_HOST}" --host-header "$PUBLIC_HOST"

      - name: Policy tests
        run: |
          docker run --rm             -v "$PWD:/work"             -w /work             openpolicyagent/conftest:v0.64.0             test --policy tests/policy/opa-policies helm mesh monitoring routing

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results
          path: |
            tests/load/results
            routing/health-checks/synthetic-monitor.log
