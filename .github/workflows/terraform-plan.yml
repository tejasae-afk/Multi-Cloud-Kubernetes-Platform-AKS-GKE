name: terraform-plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'routing/traffic-manager/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            workdir: terraform
            backend_prefix: terraform/core
          - name: edge-routing
            workdir: routing/traffic-manager
            backend_prefix: terraform/routing-edge
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Auth and kubeconfig
        uses: ./.github/actions/setup-kubeconfig
        with:
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}
          gke_cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          gke_location: ${{ vars.GKE_LOCATION }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_wrapper: false
          terraform_version: 1.14.8

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ matrix.workdir }}
        run: |
          if [[ "${{ matrix.workdir }}" == "terraform" ]]; then
            export TF_VAR_gcp_project_id="${{ vars.GCP_PROJECT_ID }}"
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_dns_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_traffic_manager_relative_name="${{ vars.TRAFFIC_MANAGER_RELATIVE_NAME }}"
          else
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_public_zone_resource_group_name="${{ vars.AZURE_DNS_RESOURCE_GROUP }}"
            export TF_VAR_public_record_name="${{ vars.PUBLIC_APP_RECORD_NAME }}"
            export TF_VAR_gke_endpoint_fqdn="${{ vars.GKE_EDGE_HOST }}"
            export TF_VAR_aks_endpoint_fqdn="${{ vars.AKS_EDGE_HOST }}"
            export TF_VAR_create_public_cname="true"
          fi

          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.backend_prefix }}"

      - name: Terraform validate
        working-directory: ${{ matrix.workdir }}
        run: |
          if [[ "${{ matrix.workdir }}" == "terraform" ]]; then
            export TF_VAR_gcp_project_id="${{ vars.GCP_PROJECT_ID }}"
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_dns_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_traffic_manager_relative_name="${{ vars.TRAFFIC_MANAGER_RELATIVE_NAME }}"
          else
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_public_zone_resource_group_name="${{ vars.AZURE_DNS_RESOURCE_GROUP }}"
            export TF_VAR_public_record_name="${{ vars.PUBLIC_APP_RECORD_NAME }}"
            export TF_VAR_gke_endpoint_fqdn="${{ vars.GKE_EDGE_HOST }}"
            export TF_VAR_aks_endpoint_fqdn="${{ vars.AKS_EDGE_HOST }}"
            export TF_VAR_create_public_cname="true"
          fi

          terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.workdir }}
        run: |
          if [[ "${{ matrix.workdir }}" == "terraform" ]]; then
            export TF_VAR_gcp_project_id="${{ vars.GCP_PROJECT_ID }}"
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_dns_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_traffic_manager_relative_name="${{ vars.TRAFFIC_MANAGER_RELATIVE_NAME }}"
          else
            export TF_VAR_azure_subscription_id="${{ vars.AZURE_SUBSCRIPTION_ID }}"
            export TF_VAR_public_zone_name="${{ vars.PUBLIC_DNS_ZONE_NAME }}"
            export TF_VAR_public_zone_resource_group_name="${{ vars.AZURE_DNS_RESOURCE_GROUP }}"
            export TF_VAR_public_record_name="${{ vars.PUBLIC_APP_RECORD_NAME }}"
            export TF_VAR_gke_endpoint_fqdn="${{ vars.GKE_EDGE_HOST }}"
            export TF_VAR_aks_endpoint_fqdn="${{ vars.AKS_EDGE_HOST }}"
            export TF_VAR_create_public_cname="true"
          fi

          terraform plan -no-color -out=tfplan | tee plan.stdout
          terraform show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.name }}
          path: |
            ${{ matrix.workdir }}/plan.stdout
            ${{ matrix.workdir }}/plan.txt

      - name: Post PR comment
        uses: actions/github-script@v8
        env:
          WORKDIR: ${{ matrix.workdir }}
          PLAN_TEXT_PATH: ${{ matrix.workdir }}/plan.txt
          PLAN_STDOUT_PATH: ${{ matrix.workdir }}/plan.stdout
          PLAN_NAME: ${{ matrix.name }}
        with:
          script: |
            const fs = require('fs');
            const planText = fs.readFileSync(process.env.PLAN_TEXT_PATH, 'utf8');
            const planStdout = fs.readFileSync(process.env.PLAN_STDOUT_PATH, 'utf8');
            const body = [
              `### Terraform plan: ${process.env.PLAN_NAME}`,
              '',
              `Path: \`${process.env.WORKDIR}\``,
              '',
              '<details><summary>terraform plan</summary>',
              '',
              '```',
              planStdout.slice(0, 60000),
              '```',
              '',
              '</details>',
              '',
              '<details><summary>terraform show</summary>',
              '',
              '```',
              planText.slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
